<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/brand/logo.png" />
    <link rel="apple-touch-icon" href="/brand/logo.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#F3F0EA" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Daydream Ops" />
    <link rel="manifest" href="/manifest.json" />
    <title>Daydream Ops</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        min-height: 100dvh;
        overflow-x: hidden;
        overflow-x: clip;
        background: #ebe8e2;
        color: #171615;
      }
    </style>
    <script>
      (function () {
        try {
          var p = localStorage.getItem('daydream_ops_view_mode') || 'auto'
          var e =
            p === 'mobile'
              ? 'mobile'
              : p === 'web'
                ? 'web'
                : window.matchMedia('(min-width: 768px)').matches
                  ? 'web'
                  : 'mobile'
          document.documentElement.dataset.viewPreference = p
          document.documentElement.dataset.effectiveView = e

          var t = localStorage.getItem('daydream_ops_theme_mode') || 'auto'
          var dark = window.matchMedia('(prefers-color-scheme: dark)').matches
          var th =
            t === 'night' ? 'night' : t === 'day' ? 'day' : dark ? 'night' : 'day'
          document.documentElement.dataset.themePreference = t
          document.documentElement.dataset.theme = th
          var meta = document.querySelector('meta[name="theme-color"]')
          if (meta) meta.setAttribute('content', th === 'night' ? '#141312' : '#ebe8e2')
        } catch (err) {
          document.documentElement.dataset.effectiveView = 'mobile'
          document.documentElement.dataset.theme = 'day'
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
